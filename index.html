<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costituzione Pokémon Edition</title>
    <style>
        :root { --pkm-color: #ffcb05; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .setup-panel { background: #2a2a2a; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; margin-bottom: 20px; border: 2px solid #444; }
        select, textarea, input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        
        /* STILE CARTA POKEMON */
        #pokemon-card {
            width: 350px; height: 500px; border-radius: 20px; position: relative;
            padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background: linear-gradient(145deg, #ffd700, #b8860b);
            color: #000; overflow: hidden; border: 8px solid #f1f1f1;
            display: none; /* Appare solo dopo la generazione */
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .card-name { font-size: 22px; text-transform: uppercase; }
        .card-hp { color: red; font-size: 20px; }
        .card-image { width: 100%; height: 200px; background: #000; margin: 10px 0; border: 4px solid #fff; object-fit: cover; }
        .ability-box { background: rgba(255,255,255,0.7); border-radius: 10px; padding: 10px; margin-top: 10px; min-height: 120px; border: 1px solid rgba(0,0,0,0.2); }
        .attack-name { font-weight: bold; border-bottom: 1px solid #000; margin-bottom: 5px; display: block; }
        .v-rule { position: absolute; bottom: 10px; left: 20px; right: 20px; background: #000; color: #fff; font-size: 8px; padding: 5px; border-radius: 5px; text-align: center; }
        
        button { background: #ffcb05; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; }
        .color-picker { display: flex; gap: 10px; margin: 10px 0; }
        .dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
    </style>
</head>
<body>

    <div class="setup-panel">
        <h2>Crea la tua Carta V</h2>
        <label>Scegli Personaggio:</label>
        <select id="char">
            <option value="Caino">Caino (Genesi)</option>
            <option value="Noè">Noè (Arca)</option>
            <option value="Agar">Agar (Straniera)</option>
            <option value="Mosè">Mosè (Libertà)</option>
        </select>

        <label>Scegli Articolo (HP):</label>
        <select id="art">
            <option value="3">Articolo 3 (Uguaglianza)</option>
            <option value="10">Articolo 10 (Asilo)</option>
            <option value="11">Articolo 11 (Pace)</option>
        </select>

        <label>Colore Carta (Tipo):</label>
        <div class="color-picker">
            <div class="dot" style="background: #ff5f6d" onclick="setCol('#ff5f6d')"></div>
            <div class="dot" style="background: #71b7ff" onclick="setCol('#71b7ff')"></div>
            <div class="dot" style="background: #78e08f" onclick="setCol('#78e08f')"></div>
            <div class="dot" style="background: #f8c291" onclick="setCol('#f8c291')"></div>
        </div>

        <label>Carica Immagine:</label>
        <input type="file" id="imgInput" accept="image/*">

        <label>Spiegazione (Attacco):</label>
        <textarea id="desc" placeholder="Come si collega l'articolo al personaggio?"></textarea>

        <button onclick="generate()">GENERA CARTA POKÉMON V</button>
    </div>

    <div id="pokemon-card">
        <div class="card-header">
            <span class="card-name" id="out-name">NOME</span>
            <span class="card-hp">HP <strong id="out-hp">180</strong></span>
        </div>
        <img id="out-img" class="card-image" src="">
        <div style="font-size: 10px; font-weight: bold; margin-bottom: 5px;">COSTITUZIONE ITALIANA</div>
        <div class="ability-box">
            <span class="attack-name" id="out-art">Articolo</span>
            <p id="out-desc" style="font-size: 12px; font-style: italic;"></p>
        </div>
        <div class="v-rule">
            <strong>REGOLA V:</strong> Se il diritto viene negato, la Repubblica interviene per proteggere la dignità umana.
        </div>
    </div>

    <script>
        let selectedColor = "linear-gradient(145deg, #ffd700, #b8860b)";

        function setCol(c) {
            selectedColor = c;
        }

        function generate() {
            document.getElementById('out-name').innerText = document.getElementById('char').value + " V";
            document.getElementById('out-hp').innerText = document.getElementById('art').value + "0";
            document.getElementById('out-art').innerText = "Potere dell'Articolo " + document.getElementById('art').value;
            document.getElementById('out-desc').innerText = document.getElementById('desc').value;
            document.getElementById('pokemon-card').style.background = selectedColor;
            document.getElementById('pokemon-card').style.display = "block";

            const file = document.getElementById('imgInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('out-img').src = e.target.result;
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
